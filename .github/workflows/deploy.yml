name: Deploy Amigo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: amigo-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install

      - name: Build app bundle
        run: bun run --filter @amigo-llm/amigo build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add deploy host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || 22 }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure deploy path exists
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DEPLOY_PATH}/frontend' '${DEPLOY_PATH}/backend/dist/server' '${DEPLOY_PATH}/backend/dist/data' '${DEPLOY_PATH}/backend/assets' '${DEPLOY_PATH}/shared'"

      - name: Upload frontend dist
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${DEPLOY_PORT}" \
            packages/amigo/dist/web/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/frontend/"

      - name: Upload backend dist
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${DEPLOY_PORT}" \
            packages/amigo/dist/server/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/backend/dist/server/"

      - name: Upload backend runtime data
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${DEPLOY_PORT}" \
            packages/amigo/dist/data/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/backend/dist/data/"

      - name: Upload backend runtime package metadata
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az \
            -e "ssh -p ${DEPLOY_PORT}" \
            packages/amigo/package.json "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/backend/dist/package.json"

      - name: Upload sandbox assets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${DEPLOY_PORT}" \
            packages/amigo/assets/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/backend/assets/"

      - name: Upload deploy script
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az \
            -e "ssh -p ${DEPLOY_PORT}" \
            ops/deploy/deploy-amigo.sh "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/backend/deploy-amigo.sh"

      - name: Run remote deploy script
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod +x '${DEPLOY_PATH}/backend/deploy-amigo.sh' && AMIGO_DEPLOY_ROOT='${DEPLOY_PATH}' bash '${DEPLOY_PATH}/backend/deploy-amigo.sh'"
